# Configuração do SonarQube — FinanceFlow
# Executar: sonar-scanner (com o servidor SonarQube no ar e um token válido)

sonar.projectKey=financeflow
sonar.projectName=FinanceFlow
sonar.projectVersion=1.0

# Fontes analisadas (back-end + front-end)
sonar.sources=backend/src,frontend/src
sonar.tests=backend/tests,frontend/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.integration.test.ts

# Exclusões de análise (gerados, deps, configs)
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.config.ts,**/*.config.js,backend/prisma/migrations/**,frontend/cypress/**

# Cobertura (relatórios LCOV gerados pelo Jest e pelo Vitest)
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/seed.ts,**/server.ts,**/main.tsx,**/prisma.ts

sonar.sourceEncoding=UTF-8
