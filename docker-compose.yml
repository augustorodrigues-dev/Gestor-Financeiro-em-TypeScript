version: '3.8'

services:
  db:
    image: postgres:15
    container_name: financeflow_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: financeflow_local
    ports:
      - "5433:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: financeflow_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@financeflow.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db